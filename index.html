<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Performance Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        small {
            color: gray;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card col-md-6 mx-auto">

        <h2>🎓 Student Performance Predictor</h2>

        <form action="/predict" method="post">

            <!-- Previous Score -->
            <div class="mb-3">
                <label class="form-label">Previous Score</label>
                <input type="number" name="previous_score" class="form-control" min="0" max="100" required>
                <small>Range: 0–100 (e.g., 75)</small>
            </div>

            <!-- Attendance -->
            <div class="mb-3">
                <label class="form-label">Attendance (%)</label>
                <input type="number" name="attendance_percentage" class="form-control" min="0" max="100" required>
                <small>Range: 0–100 (e.g., 85)</small>
            </div>

            <!-- Study Hours (Weekly now) -->
            <div class="mb-3">
                <label class="form-label">Study Hours (per WEEK)</label>
                <input type="number" name="weekly_study_hours" class="form-control" min="0" max="100" required>
                <small>Example: 14 → means ~2 hours/day</small>
            </div>

            <!-- Sleep -->
            <div class="mb-3">
                <label class="form-label">Sleep Hours (per day)</label>
                <input type="number" name="sleep_hours" class="form-control" min="0" max="12" required>
                <small>Range: 4–10 (e.g., 7)</small>
            </div>

            <!-- Anxiety -->
            <div class="mb-3">
                <label class="form-label">Anxiety Level</label>
                <input type="number" name="exam_anxiety_score" class="form-control" min="1" max="10" required>
                <small>Scale: 1 (low) → 10 (high) (e.g., 6)</small>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                🔍 Predict Performance
            </button>

        </form>

    </div>
</div>

</body>
</html>
