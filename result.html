<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #43cea2, #185a9d);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .badge {
            font-size: 1.2rem;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card col-md-6 mx-auto">

        <h2>📊 Prediction Result</h2>

        <p><strong>Random Forest Grade:</strong> 
            <span class="badge bg-primary">{{ rf_grade }}</span>
        </p>

        <p><strong>Neural Network Grade:</strong> 
            <span class="badge bg-success">{{ ann_grade }}</span>
        </p>

        <p><strong>K-Means Cluster:</strong> 
        <span class="badge bg-warning text-dark">{{ cluster_label }}</span>
        </p>

        <hr>

        <h4>💡 Recommendations</h4>
        <ul class="list-group">
            {% for tip in tips %}
                <li class="list-group-item">{{ tip }}</li>
            {% endfor %}
        </ul>

        <br>

        <a href="/" class="btn btn-dark w-100">🔙 Go Back</a>

    </div>
</div>

</body>
</html>
